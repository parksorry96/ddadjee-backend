server:
  port: 9090

spring:
  application:
    name: ddadjee-backend

  messages:
    basename: messages/messages
    encoding: UTF-8
    cache-duration: 3600
    use-code-as-default-message: true


  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ddadjee}
    username: ${DB_USERNAME:ddadjee}
    password: ${DB_PASSWORD:ddadjee123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: ${JWT_PUBLIC_KEY_PATH}
          issuer-uri: http://localhost:8080


app:
  jwt:
    private-key-location: ${JWT_PRIVATE_KEY_PATH}  # 발급용
    public-key-location: ${JWT_PUBLIC_KEY_PATH}   # 검증용
    access-token-expiration: 3600000   # 1시간
    refresh-token-expiration: 604800000 # 7일
    issuer: ${JWT_ISSUER}